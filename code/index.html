<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cardápio</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* container do flip ocupa a tela */
    #flip {
      width: 100vw;
      height: 100vh;
      margin: 0;
    }

    /* cada "página" */
    .page {
      width: 100%;
      height: 100%;
      background: #000;
    }

    .page img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill; /* <- cobre 100% (pode distorcer, como você pediu) */
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>

  <!-- StPageFlip via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
</head>

<body>
  <div id="flip">
    <!-- As páginas (ordem 1..8) -->
    <div class="page"><img src="../img/1.jpeg" alt="1"></div>
    <div class="page"><img src="../img/2.jpeg" alt="2"></div>
    <div class="page"><img src="../img/3.jpeg" alt="3"></div>
    <div class="page"><img src="../img/4.jpeg" alt="4"></div>
    <div class="page"><img src="../img/5.jpeg" alt="5"></div>
    <div class="page"><img src="../img/6.jpeg" alt="6"></div>
    <div class="page"><img src="../img/7.jpeg" alt="7"></div>
    <div class="page"><img src="../img/8.jpg"  alt="8"></div>
  </div>

    <script>
        window.addEventListener('load', () => {
        const container = document.getElementById('flip');

        const build = () => {
            const W = Math.floor(container.clientWidth);
            const H = Math.floor(container.clientHeight);

            // Base de 1 página (portrait): largura da tela toda / 1 página
            // (a ideia é impedir a lib de “achar” que cabe 2 páginas)
            const pageW = W;
            const pageH = H;

           const pageFlip = new St.PageFlip(container, {
            width: pageW,
            height: pageH,
            size: "stretch",
            usePortrait: true,
            minWidth: pageW,
            maxWidth: pageW,
            minHeight: pageH,
            maxHeight: pageH,
            showCover: true,
            mobileScrollSupport: false,
            maxShadowOpacity: 0.35,
            flippingTime: 600
            });

            pageFlip.loadFromHTML(document.querySelectorAll('#flip .page'));
            return pageFlip;
        };

        let pf = build();

        const rebuild = () => {
            try { pf.destroy(); } catch(e) {}
            pf = build();
        };

        window.addEventListener('resize', () => setTimeout(rebuild, 80));
        window.addEventListener('orientationchange', () => setTimeout(rebuild, 80));
        });
    </script>
</body>
</html>
